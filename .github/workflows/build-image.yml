name: Build and push image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/nthung2499/fake-gk
  GITOPS_REPO: NTHung2499/k8s-gitops-demo

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag
        id: image-tag
        run: echo "tag=$(date -u +'%Y.%m.%d.%H%M')" >> "$GITHUB_OUTPUT"

      - name: Build image
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: latest ${{ steps.image-tag.outputs.tag }}
          containerfiles: |
            ./Dockerfile

      - name: Push image
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update Fake GK image tag
        uses: mikefarah/yq@v4
        with:
          cmd: yq -i '.image.tag = "${{ steps.image-tag.outputs.tag }}"' gitops/charts/fake-gk/values-dev.yaml

      - name: Promote image tag to GitOps repo
        working-directory: gitops
        run: |
          if git diff --quiet -- charts/fake-gk/values-dev.yaml; then
            echo "No GitOps image tag change to promote."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/fake-gk/values-dev.yaml
          git commit -m "[ARGOCD] - Promote Fake GK to ${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}"
          git push
